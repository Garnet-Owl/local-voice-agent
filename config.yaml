stt:
  model_id: "UsefulSensors/moonshine-tiny"
  device: "cpu"

llm:
  model: "gemini-3-flash-preview"

  system_prompt: >
    You are a helpful, concise voice assistant.
    Keep responses short and conversational — you are speaking aloud, not writing.
    Avoid bullet points, markdown, or lists. Speak in plain sentences only.

tts:
  model_id: "af_heart"
  device: "cpu"

audio_capture:
  sample_rate: 16000
  # Silero VAD threshold (0.0 to 1.0). Higher = less sensitive.
  vad_threshold: 0.5
  # Silence duration (seconds) before speech is considered finished.
  silence_timeout_sec: 1.2
  # Minimum speech duration (seconds) required to trigger transcription.
  min_speech_sec: 0.5

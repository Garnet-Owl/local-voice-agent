stt:
  model_id: "openai/whisper-base"
  #   model_id: "microsoft/VibeVoice-ASR-HF"
  # CPU-only: keep as "cpu". Switch to "cuda" when a CUDA GPU is available.
  device: "cpu"

llm:
  model: "gemini-3-flash-preview"

  system_prompt: >
    You are a helpful, concise voice assistant.
    Keep responses short and conversational — you are speaking aloud, not writing.
    Avoid bullet points, markdown, or lists. Speak in plain sentences only.

tts:
  model_id: "microsoft/speecht5_tts"
  vocoder_id: "microsoft/speecht5_hifigan"
  # CPU-only: keep as "cpu". Switch to "cuda" when a CUDA GPU is available.
  device: "cpu"
  #   model_id: "OpenMOSS-Team/MOSS-TTS-Realtime"
  #  codec_id: "OpenMOSS-Team/MOSS-Audio-Tokenizer"
  #  # Path to a short reference wav (~5-10s) used to establish voice style.
  #  # Place your file at audio/prompt.wav or update this path.
  #  prompt_wav: "audio/prompt.wav"
  #  sample_rate: 24000
  #  # Switch to "cuda" when a CUDA GPU is available.

audio_capture:
  sample_rate: 16000
  # VAD aggressiveness: 0 (least) to 3 (most). Higher = ignores more background noise.
  vad_aggressiveness: 2
  # Silence duration (seconds) before speech is considered finished.
  silence_timeout_sec: 1.2
  # Minimum speech duration (seconds) required to trigger transcription.
  min_speech_sec: 0.5
  # VAD frame size in ms — must be exactly 10, 20, or 30.
  frame_duration_ms: 30
